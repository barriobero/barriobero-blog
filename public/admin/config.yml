backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "https://barriobero.es"
display_url: "https://barriobero.es"
logo_url: "https://barriobero.es/favicon.ico"

collections:
  - name: "posts"
    label: "Artículos"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "posts/{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Categoría", name: "category", widget: "select", options: ["Ensayo", "Lecturas", "Viaje", "Aprendizaje", "Notas"] }
      - { label: "Resumen", name: "excerpt", widget: "text" }
      - { label: "Tiempo de lectura", name: "readingTime", widget: "string", default: "5 min" }
      - { label: "Contenido", name: "body", widget: "markdown" }